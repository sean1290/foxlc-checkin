<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>특별 미션 · Fox Learning Center</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root{
  --bg:#FFF8F0;--p:#FF6B35;--pl:#FFE8DF;
  --s:#4ECDC4;--sl:#E0F7F5;
  --a:#FFD166;--al:#FFF5D6;
  --v:#A78BFA;--vl:#EDE9FE;
  --t:#1A1A2E;--m:#6B7280;--b:#E5E7EB;
  --r:20px;--rs:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);min-height:100vh;color:var(--t);overflow-x:hidden}

.hdr{background:rgba(255,255,255,.75);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:16px 24px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(229,231,235,.6);position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.06)}
.logo{font-family:'Gaegu',cursive;font-size:20px;font-weight:700;color:var(--p)}.logo span{color:var(--t)}
.hdr-title{font-size:15px;font-weight:800;color:var(--t);margin-left:4px}

.scr{display:none;min-height:calc(100vh - 65px);padding:28px 20px 60px}
.scr.on{display:block;animation:fadeUp .35s cubic-bezier(.25,.46,.45,.94)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@media(min-width:560px){.scr{max-width:600px;margin:0 auto}}

/* locked */
.lock-wrap{text-align:center;padding:60px 0}
.lock-ico{font-size:72px;display:block;margin-bottom:20px;opacity:.4}
.lock-title{font-size:20px;font-weight:900;margin-bottom:10px}
.lock-sub{font-size:14px;color:var(--m);line-height:1.8}

/* ready */
.ready-wrap{text-align:center;padding:48px 0 32px}
.ready-ico{font-size:80px;display:block;margin-bottom:16px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1);filter:drop-shadow(0 0 0 rgba(167,139,250,0))}50%{transform:scale(1.08);filter:drop-shadow(0 0 18px rgba(167,139,250,.55))}}
.ready-title{font-family:'Gaegu',cursive;font-size:32px;color:var(--p);margin-bottom:8px}
.ready-sub{font-size:14px;color:var(--m);line-height:1.8;margin-bottom:32px}
.ready-badge{display:inline-flex;align-items:center;gap:6px;background:var(--vl);color:#5B21B6;border-radius:99px;padding:7px 18px;font-size:13px;font-weight:700;margin-bottom:28px}

/* mission cards */
.mission-card{background:#fff;border-radius:var(--r);padding:22px 20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 8px 24px rgba(0,0,0,.08);border:2px solid transparent;transition:border-color .3s}
.mission-card.hl{border-color:var(--v)}
.mission-card.hl-warm{border-color:var(--p)}
.card-label{font-size:11px;font-weight:700;color:var(--v);letter-spacing:.1em;margin-bottom:10px}
.card-label.warm{color:var(--p)}
.scenario-text{font-size:14px;line-height:2;color:var(--t);font-weight:500;word-break:keep-all}
.question-text{font-size:16px;font-weight:900;line-height:1.5;color:var(--t);word-break:keep-all;margin-bottom:14px}

/* action options (purple) */
.opts{display:flex;flex-direction:column;gap:10px}
.opt-btn{padding:14px 18px;border:2.5px solid var(--b);border-radius:var(--rs);background:#fff;font-size:14px;font-weight:600;cursor:pointer;text-align:left;font-family:'Noto Sans KR',sans-serif;color:var(--t);transition:all .18s;line-height:1.4}
.opt-btn:hover{border-color:var(--v);background:var(--vl)}
.opt-btn.on{border-color:var(--v);background:var(--v);color:#fff}
.opt-btn.off{opacity:.45;cursor:not-allowed}

/* emotion options (warm orange, horizontal pills) */
.emo-opts{display:flex;flex-wrap:wrap;gap:10px}
.emo-btn{padding:11px 18px;border:2.5px solid var(--b);border-radius:99px;background:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:var(--t);transition:all .18s}
.emo-btn:hover{border-color:var(--p);background:var(--pl)}
.emo-btn.on{border-color:var(--p);background:var(--p);color:#fff}
.emo-btn.off{opacity:.45;cursor:not-allowed}

/* reflection */
.refl-hint{font-size:12px;color:var(--m);font-weight:600;margin-bottom:8px}
.refl-ta{width:100%;padding:13px 14px;border:2.5px solid var(--b);border-radius:var(--rs);font-size:14px;font-family:'Noto Sans KR',sans-serif;color:var(--t);outline:none;transition:border-color .2s;resize:none;background:#fff;line-height:1.8}
.refl-ta:focus{border-color:var(--v)}

/* buttons */
.btn{display:block;width:100%;padding:17px;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);font-family:'Noto Sans KR',sans-serif}
.btn-mission{background:linear-gradient(135deg,var(--v),#8B5CF6);color:#fff;box-shadow:0 4px 8px rgba(0,0,0,.08),0 6px 20px rgba(167,139,250,.4)}
.btn-mission:hover{transform:translateY(-3px);box-shadow:0 6px 12px rgba(0,0,0,.1),0 12px 28px rgba(167,139,250,.5)}
.btn-mission:active{transform:scale(.97);transition-duration:.1s}
.btn-mission:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none}
.btn-back{background:#fff;color:var(--m);border:2px solid var(--b);margin-top:10px}
.btn-back:hover{border-color:var(--m)}

/* message */
.msg-card{background:linear-gradient(135deg,var(--vl),var(--al));border-radius:var(--r);padding:22px 20px;text-align:center;font-size:15px;font-weight:700;line-height:2;color:var(--t);word-break:keep-all;display:none;animation:fadeUp .4s ease}
.msg-card.on{display:block}

/* reward screen */
.reward-title{font-family:'Gaegu',cursive;font-size:28px;color:var(--p);text-align:center;margin-bottom:6px}
.reward-sub{font-size:14px;font-weight:700;color:var(--t);text-align:center;margin-bottom:20px}
.reward-opts{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.reward-btn{padding:18px 20px;border:2.5px solid var(--b);border-radius:var(--r);background:#fff;font-size:15px;font-weight:700;cursor:pointer;text-align:left;font-family:'Noto Sans KR',sans-serif;color:var(--t);transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;align-items:center;gap:14px}
.reward-btn:hover{border-color:var(--a);background:var(--al);transform:translateY(-2px)}
.reward-btn.on{border-color:var(--p);background:linear-gradient(135deg,var(--pl),var(--al));transform:translateY(-2px);box-shadow:0 4px 16px rgba(255,107,53,.25)}
.reward-btn.off{opacity:.4;cursor:not-allowed;transform:none}
.reward-ico{font-size:28px;flex-shrink:0}
.reward-notice{background:var(--sl);border-radius:var(--rs);padding:16px 18px;font-size:14px;font-weight:700;color:#0F766E;line-height:1.8;text-align:center;display:none;animation:fadeUp .35s ease}
.reward-notice.on{display:block}

/* done screen */
.done-wrap{text-align:center;padding:56px 0 28px}
.done-ico{font-size:80px;display:block;margin-bottom:16px;animation:pop .6s cubic-bezier(.34,1.56,.64,1) .1s both}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.done-title{font-family:'Gaegu',cursive;font-size:28px;color:var(--p);margin-bottom:8px;animation:fadeUp .4s ease .4s both}
.done-sub{font-size:14px;color:var(--m);line-height:1.8;animation:fadeUp .4s ease .6s both}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">🦊 Fox<span>LC</span></div>
  <div class="hdr-title">✨ 특별 미션</div>
</header>

<!-- LOCKED -->
<div id="s-locked" class="scr on">
  <div class="lock-wrap">
    <span class="lock-ico">🔒</span>
    <div class="lock-title">아직 미션이 열리지 않았어요</div>
    <div class="lock-sub">감정체크를 5회 완료할 때마다<br>특별 미션이 열려요 🌟<br><br>꾸준히 기록해 봐요!</div>
  </div>
  <button class="btn btn-back" onclick="history.back()">← 돌아가기</button>
</div>

<!-- READY -->
<div id="s-ready" class="scr">
  <div class="ready-wrap">
    <span class="ready-ico">🎉</span>
    <div class="ready-title">특별 미션 해금!</div>
    <div class="ready-sub" id="readySub"></div>
    <div class="ready-badge">✨ 이번 주 특별 미션이에요 🌟</div>
  </div>
  <div class="mission-card" style="text-align:center;padding:20px">
    <div style="font-size:14px;color:var(--m);line-height:1.8;font-weight:500">천천히 읽고 생각해 보세요.<br>미션을 완성하면 특별한 보상이 있어요! 🎁</div>
  </div>
  <button class="btn btn-mission" onclick="startMission()">미션 시작하기 →</button>
  <button class="btn btn-back" onclick="history.back()">← 나중에 할게요</button>
</div>

<!-- MISSION -->
<div id="s-mission" class="scr">
  <!-- 상황 -->
  <div class="mission-card hl">
    <div class="card-label">📖 상황</div>
    <div class="scenario-text" id="mission-scenario"></div>
  </div>
  <!-- 감정 질문 -->
  <div class="mission-card hl-warm">
    <div class="card-label warm">💭 내 감정</div>
    <div class="question-text" id="mission-emotion-question"></div>
    <div class="emo-opts" id="mission-emotion-options"></div>
  </div>
  <!-- 행동 질문 -->
  <div class="mission-card">
    <div class="card-label">🤔 내 선택</div>
    <div class="question-text" id="mission-question"></div>
    <div class="opts" id="mission-options"></div>
  </div>
  <!-- 생각 입력 -->
  <div class="mission-card">
    <div class="card-label">✏️ 내 생각</div>
    <div class="refl-hint" id="mission-reason-prompt"></div>
    <textarea class="refl-ta" id="mission-input" rows="3" placeholder="짧게 써도 괜찮아요. 솔직한 생각을 들려주세요 😊"></textarea>
  </div>
  <div class="msg-card" id="mission-message"></div>
  <button class="btn btn-mission" id="mission-submit" disabled onclick="submitMission()">제출하기 🎉</button>
  <button class="btn btn-back" id="backBtn" onclick="history.back()">← 돌아가기</button>
</div>

<!-- REWARD -->
<div id="s-reward" class="scr">
  <div style="text-align:center;font-size:40px;margin-bottom:12px;animation:pop .5s cubic-bezier(.34,1.56,.64,1)">🎉</div>
  <div class="reward-title">특별 미션 완료!</div>
  <div class="reward-sub">보상을 선택해 보세요:</div>
  <div class="reward-opts">
    <button class="reward-btn" onclick="selectReward(this,'원하는 연구원님과 산책하기!')">
      <span class="reward-ico">🚶</span>
      <span>원하는 연구원님과 산책하기!</span>
    </button>
    <button class="reward-btn" onclick="selectReward(this,'영어 연구소 - 2 Fox Points!')">
      <span class="reward-ico">⭐</span>
      <span>영어 연구소 - 2 Fox Points!</span>
    </button>
    <button class="reward-btn" onclick="selectReward(this,'SEL 연구소 - 칭찬판 스티커 2개!')">
      <span class="reward-ico">🌟</span>
      <span>SEL 연구소 - 칭찬판 스티커 2개!</span>
    </button>
    <button class="reward-btn" onclick="selectReward(this,'수리 연구소 - 플레이팩토 대결권! (원하는 사람과 원하는 게임 하기)')">
      <span class="reward-ico">🎲</span>
      <span>수리 연구소 - 플레이팩토 대결권! (원하는 사람과 원하는 게임 하기)</span>
    </button>
  </div>
  <div class="reward-notice" id="rewardNotice">
    📣 선택 후 주변에 계신 연구원님께 꼭 보여 주세요!
  </div>
  <button class="btn btn-mission" id="rewardConfirm" style="display:none;margin-top:16px" onclick="completeMission()">확인했어요! ✅</button>
</div>

<!-- DONE -->
<div id="s-done" class="scr">
  <div class="done-wrap">
    <span class="done-ico">🌟</span>
    <div class="done-title">미션 완료!</div>
    <div class="done-sub">오늘도 멋지게 생각해 봤어요 💛<br>이 기록이 쌓여서 더 단단한 내가 될 거예요.</div>
  </div>
  <button class="btn btn-mission" onclick="history.back()">감정체크로 돌아가기</button>
</div>

<script>
const MISSIONS = [
  {id:1,scenario:"친구와 함께 준비한 발표가 끝났어요. 나는 열심히 준비했다고 생각했는데 선생님은 친구만 칭찬했어요. 친구는 기뻐했고 나는 웃으면서 축하해줬어요. 그런데 마음 한쪽이 불편하고 아쉬운 느낌이 들었어요. 왜 이런 기분이 드는지 생각하게 되었어요.",emotionQuestion:"이 상황에서 나라면 어떤 기분이 들 것 같나요?",emotionOptions:["서운함","기쁨","아무렇지 않음"],actionQuestion:"이 상황에서 가장 좋은 선택은 무엇일까요?",options:["친구를 진심으로 축하한다","아무 말도 하지 않는다","내 기분을 먼저 표현한다"],reasonPrompt:"왜 이 선택이 좋다고 생각하나요?",reflectionPrompt:"비슷한 상황이 생기면 나는 어떻게 행동할까요?",message:"복잡한 감정을 알아차린 점이 정말 좋아. 그런 마음을 이해하는 게 성장의 시작이야."},
  {id:2,scenario:"친구가 나에게 비밀 이야기를 해줬어요. 처음에는 기뻤지만 시간이 지나면서 다른 친구에게 말하고 싶은 마음이 생겼어요. 말하면 안 된다는 걸 알지만 계속 고민이 되었어요. 마음이 점점 불편해졌어요.",emotionQuestion:"이 상황에서 나는 어떤 기분일까요?",emotionOptions:["갈등됨","걱정됨","기쁨"],actionQuestion:"나는 어떻게 할까요?",options:["비밀을 지킨다","다른 친구에게 말한다","친구에게 다시 확인한다"],reasonPrompt:"왜 이 선택이 좋다고 생각하나요?",reflectionPrompt:"다음에 이런 상황이 생기면 나는 어떻게 할까요?",message:"책임감 있는 선택을 고민한 점이 정말 좋아. 신뢰는 이렇게 만들어져."},
  {id:3,scenario:"친구가 나와 약속을 했는데 다른 친구와 먼저 놀고 있었어요. 나는 혼자 남게 되었고 조금 서운했어요. 친구는 나중에 미안하다고 했지만 마음이 쉽게 풀리지 않았어요.",emotionQuestion:"이 상황에서 나는 어떤 기분일까요?",emotionOptions:["서운함","화남","괜찮음"],actionQuestion:"나는 어떻게 할까요?",options:["솔직하게 말한다","그냥 넘어간다","거리를 둔다"],reasonPrompt:"왜 이 선택이 좋다고 생각하나요?",reflectionPrompt:"나는 어떤 관계를 만들고 싶나요?",message:"솔직한 마음을 표현하는 건 용기 있는 행동이야."},
  {id:4,scenario:"모둠 활동에서 내가 의견을 냈지만 친구들이 반대했어요. 내 생각이 틀린 건 아닌 것 같지만 자신감이 떨어졌어요. 어떻게 해야 할지 고민이 되었어요.",emotionQuestion:"이 상황에서 나는 어떤 기분일까요?",emotionOptions:["속상함","불안함","괜찮음"],actionQuestion:"나는 어떻게 할까요?",options:["다시 설명한다","친구 의견을 따른다","아무 말도 하지 않는다"],reasonPrompt:"왜 이 선택이 좋다고 생각하나요?",reflectionPrompt:"다음에 이런 상황이 생기면 나는 어떻게 할까요?",message:"생각을 표현하려는 용기가 정말 중요해."},
  {id:5,scenario:"친구가 발표를 하다가 실수했고 몇몇 친구들이 웃었어요. 그 친구는 얼굴이 빨개졌어요. 나는 그 상황을 보면서 어떻게 해야 할지 고민했어요.",emotionQuestion:"이 상황을 보면 어떤 기분이 드나요?",emotionOptions:["안타까움","불편함","아무렇지 않음"],actionQuestion:"나는 어떻게 할까요?",options:["괜찮다고 말해준다","가만히 있는다","같이 웃는다"],reasonPrompt:"왜 이 선택이 좋다고 생각하나요?",reflectionPrompt:"다음에 이런 상황이 생기면 나는 어떻게 할까요?",message:"다른 사람의 마음을 생각한 선택이 정말 좋아."},

  {id:30,scenario:"친구가 나에게 장난으로 밀쳤는데 나는 넘어질 뻔했어요. 친구는 장난이라고 했지만 나는 위험하다고 느꼈어요. 그냥 넘어갈지 말지 고민이 되었어요.",emotionQuestion:"이 상황에서 나는 어떤 기분일까요?",emotionOptions:["불안","화남","놀람"],actionQuestion:"나는 어떻게 할까요?",options:["위험하다고 말한다","웃으며 넘긴다","화를 낸다"],reasonPrompt:"왜 이 선택이 좋다고 생각하나요?",reflectionPrompt:"나는 안전을 어떻게 지킬까요?",message:"안전을 지키는 선택은 언제나 중요해."},
  {id:31,scenario:"친한 친구가 숙제를 하지 못해서 나에게 답을 보여달라고 했어요. 친구는 이번만 도와달라고 부탁했어요. 도와주면 친구는 기뻐할 것 같지만 규칙을 어기는 행동이라는 것도 알고 있었어요. 도와주지 않으면 친구가 서운해할까 봐 걱정이 되었어요.",emotionQuestion:"이 상황에서 나는 어떤 기분일까요?",emotionOptions:["고민됨","부담됨","걱정됨"],actionQuestion:"나는 어떻게 할까요?",options:["답을 보여준다","방법만 알려준다","도와주지 않는다"],reasonPrompt:"왜 이 선택이 좋다고 생각하나요?",reflectionPrompt:"나는 관계와 규칙 사이에서 어떻게 선택할까요?",message:"어려운 상황에서도 올바른 선택을 고민한 점이 정말 중요해."},
  {id:32,scenario:"친구가 다른 친구에 대해 험담을 하고 있었어요. 나에게도 같이 이야기하자고 했어요. 그 친구와 계속 친하게 지내고 싶었지만 이런 대화가 맞는지 고민이 되었어요.",emotionQuestion:"이 상황에서 나는 어떤 기분일까요?",emotionOptions:["불편함","망설임","고민됨"],actionQuestion:"나는 어떻게 할까요?",options:["함께 험담한다","대화를 바꾼다","그만하자고 말한다"],reasonPrompt:"왜 이 선택이 좋다고 생각하나요?",reflectionPrompt:"나는 어떤 친구가 되고 싶은가요?",message:"관계를 지키면서도 바른 선택을 하려는 태도가 멋져."},
  {id:33,scenario:"모둠 활동에서 한 친구가 거의 참여하지 않았어요. 발표는 다 같이 해야 하는 상황이었고 그 친구도 같은 점수를 받게 될 것 같았어요. 공정하지 않다고 느꼈지만 분위기를 깨고 싶지 않았어요.",emotionQuestion:"이 상황에서 나는 어떤 기분일까요?",emotionOptions:["불공평함","답답함","고민됨"],actionQuestion:"나는 어떻게 할까요?",options:["선생님께 이야기한다","친구에게 직접 말한다","그냥 넘어간다"],reasonPrompt:"왜 이 선택이 좋다고 생각하나요?",reflectionPrompt:"나는 공정함을 어떻게 지킬까요?",message:"공정함을 고민하는 모습이 정말 중요해."},
  {id:34,scenario:"친구가 나에게 장난으로 했다고 말했지만 나는 상처를 받았어요. 친구는 계속 장난이라고 웃고 있었어요. 내가 예민한 건지 고민이 되었어요.",emotionQuestion:"이 상황에서 나는 어떤 기분일까요?",emotionOptions:["상처받음","혼란","불편함"],actionQuestion:"나는 어떻게 할까요?",options:["솔직하게 말한다","참는다","같이 웃는다"],reasonPrompt:"왜 이 선택이 좋다고 생각하나요?",reflectionPrompt:"나는 나의 감정을 어떻게 지킬까요?",message:"자신의 감정을 존중하는 선택이 정말 중요해."},
  {id:35,scenario:"시험 중에 옆 친구가 답을 물어봤어요. 작은 목소리로 부탁했어요. 도와주면 들키지 않을 수도 있지만 규칙을 어기는 행동이에요. 친구와의 관계와 규칙 사이에서 고민이 되었어요.",emotionQuestion:"이 상황에서 나는 어떤 기분일까요?",emotionOptions:["긴장됨","고민됨","불안함"],actionQuestion:"나는 어떻게 할까요?",options:["답을 알려준다","거절한다","무시한다"],reasonPrompt:"왜 이 선택이 좋다고 생각하나요?",reflectionPrompt:"나는 책임 있는 선택을 어떻게 할까요?",message:"책임 있는 선택을 고민한 점이 정말 중요해."},
  {id:36,scenario:"친구가 계속 늦게 와서 나를 기다리게 했어요. 오늘도 또 늦었어요. 나는 계속 이해해주고 있었지만 점점 화가 나기 시작했어요. 관계를 유지하면서도 내 마음을 지키고 싶었어요.",emotionQuestion:"이 상황에서 나는 어떤 기분일까요?",emotionOptions:["짜증","서운함","지침"],actionQuestion:"나는 어떻게 할까요?",options:["솔직하게 말한다","계속 참는다","약속을 줄인다"],reasonPrompt:"왜 이 선택이 좋다고 생각하나요?",reflectionPrompt:"나는 나의 시간을 어떻게 지킬까요?",message:"관계와 나를 함께 생각하는 선택이 중요해."},
  {id:37,scenario:"친구가 나에게만 계속 고민을 털어놓았어요. 처음에는 잘 들어줬지만 점점 나도 힘들어졌어요. 친구를 도와주고 싶지만 내 마음도 지키고 싶었어요.",emotionQuestion:"이 상황에서 나는 어떤 기분일까요?",emotionOptions:["지침","부담됨","고민됨"],actionQuestion:"나는 어떻게 할까요?",options:["계속 들어준다","적절히 선을 둔다","피한다"],reasonPrompt:"왜 이 선택이 좋다고 생각하나요?",reflectionPrompt:"나는 도움과 나를 어떻게 균형 잡을까요?",message:"자신을 지키면서 도우려는 태도가 정말 중요해."},
  {id:38,scenario:"친구가 규칙을 어기는 행동을 했어요. 선생님은 그 사실을 모르고 있었어요. 말하면 친구가 혼날 수 있고, 말하지 않으면 계속 그런 행동을 할 것 같았어요.",emotionQuestion:"이 상황에서 나는 어떤 기분일까요?",emotionOptions:["고민됨","불편함","망설임"],actionQuestion:"나는 어떻게 할까요?",options:["선생님께 말한다","친구에게 먼저 말한다","그냥 둔다"],reasonPrompt:"왜 이 선택이 좋다고 생각하나요?",reflectionPrompt:"나는 올바름을 어떻게 지킬까요?",message:"옳은 행동을 고민하는 모습이 정말 중요해."},
  {id:39,scenario:"친구들이 특정 친구를 빼고 놀자고 했어요. 나에게도 같이 하자고 했어요. 함께하면 재미있을 것 같지만 그 친구가 혼자 남게 되는 것이 마음에 걸렸어요.",emotionQuestion:"이 상황에서 나는 어떤 기분일까요?",emotionOptions:["불편함","미안함","망설임"],actionQuestion:"나는 어떻게 할까요?",options:["같이 논다","거절한다","그 친구를 포함시키려 한다"],reasonPrompt:"왜 이 선택이 좋다고 생각하나요?",reflectionPrompt:"나는 어떤 친구가 되고 싶나요?",message:"다른 사람을 생각하는 선택이 정말 소중해."},
  {id:40,scenario:"내가 한 선택이 친구에게 상처를 줄 수도 있다는 걸 나중에 알게 되었어요. 그때는 몰랐지만 지금은 마음이 불편했어요. 어떻게 해야 할지 고민이 되었어요.",emotionQuestion:"이 상황에서 나는 어떤 기분일까요?",emotionOptions:["미안함","후회","걱정"],actionQuestion:"나는 어떻게 할까요?",options:["사과한다","그냥 둔다","다른 행동으로 보인다"],reasonPrompt:"왜 이 선택이 좋다고 생각하나요?",reflectionPrompt:"나는 실수를 어떻게 바로잡을까요?",message:"자신의 행동을 돌아보는 모습이 정말 성장의 시작이야."}
];

const kCI  = n => `foxlc_ci_${n}`;
const kLMC = n => `foxlc_lmc_${n}`;
const kLMI = n => `foxlc_lmi_${n}`;
const K_CUR    = 'foxlc_current';
const K_SCRIPT = 'foxlc_script_url';
const DEFAULT_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxTmT36oXlO3oEZPff8-hWkIkTBLiSL7UaW8jf8VSdoB4RtWHTs3fEEYXJus6K1TEpWRQ/exec';

let currentMission  = null;
let selectedEmoOpt  = null;
let selectedOpt     = null;
let submitted       = false;
let selectedReward  = null;

document.addEventListener('DOMContentLoaded', () => {
  const name = localStorage.getItem(K_CUR);
  if (!name) { show('s-locked'); return; }

  const ci  = parseInt(localStorage.getItem(kCI(name))  || '0');
  const lmc = parseInt(localStorage.getItem(kLMC(name)) || '0');
  const unlocked = ci >= 5 && ci % 5 === 0 && lmc !== ci;

  if (!unlocked) { show('s-locked'); return; }

  const lastId = parseInt(localStorage.getItem(kLMI(name)) || '0');
  const pool   = MISSIONS.filter(m => m.id !== lastId);
  currentMission = pool[Math.floor(Math.random() * pool.length)];

  const nc = nameCall(name);
  document.getElementById('readySub').innerHTML =
    `<strong>${nc}</strong>, 감정체크 <strong>${ci}회</strong>를 완료했어요! 🎉<br>특별 미션이 열렸어요. 한번 도전해 볼까요?`;

  show('s-ready');
});

const show = id => {
  document.querySelectorAll('.scr').forEach(s => s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  window.scrollTo({top:0, behavior:'smooth'});
};

function nameCall(full) {
  const first = full.slice(1);
  const last  = first[first.length - 1];
  const code  = last.charCodeAt(0);
  if (code < 0xAC00 || code > 0xD7A3) return first + '야';
  return first + ((code - 0xAC00) % 28 === 0 ? '야' : '아');
}

function startMission() {
  if (!currentMission) return;
  renderMission(currentMission);
  show('s-mission');
}

function renderMission(data) {
  // 상황
  document.getElementById('mission-scenario').textContent = data.scenario;

  // 감정 질문
  document.getElementById('mission-emotion-question').textContent = data.emotionQuestion;
  const emoEl = document.getElementById('mission-emotion-options');
  emoEl.innerHTML = '';
  data.emotionOptions.forEach(opt => {
    const b = document.createElement('button');
    b.className = 'emo-btn';
    b.textContent = opt;
    b.onclick = () => selectEmoOption(b);
    emoEl.appendChild(b);
  });

  // 행동 질문
  document.getElementById('mission-question').textContent = data.actionQuestion;
  const optsEl = document.getElementById('mission-options');
  optsEl.innerHTML = '';
  data.options.forEach(opt => {
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.textContent = opt;
    b.onclick = () => selectOption(b);
    optsEl.appendChild(b);
  });

  // 생각 입력
  document.getElementById('mission-reason-prompt').textContent = data.reasonPrompt;
  const ta = document.getElementById('mission-input');
  ta.placeholder = data.reflectionPrompt;
  ta.value = '';
  ta.disabled = false;
  ta.oninput = checkSubmitReady;

  document.getElementById('mission-message').classList.remove('on');
  document.getElementById('backBtn').style.display = '';

  const btn = document.getElementById('mission-submit');
  btn.textContent = '제출하기 🎉';
  btn.disabled = true;
  btn.onclick = submitMission;

  selectedEmoOpt = null;
  selectedOpt    = null;
  submitted      = false;
}

function selectEmoOption(btn) {
  if (submitted) return;
  selectedEmoOpt = btn.textContent;
  document.querySelectorAll('#mission-emotion-options .emo-btn').forEach(b => {
    b.classList.toggle('on',  b === btn);
    b.classList.toggle('off', b !== btn);
  });
  checkSubmitReady();
}

function selectOption(btn) {
  if (submitted) return;
  selectedOpt = btn.textContent;
  document.querySelectorAll('#mission-options .opt-btn').forEach(b => {
    b.classList.toggle('on',  b === btn);
    b.classList.toggle('off', b !== btn);
  });
  checkSubmitReady();
}

function checkSubmitReady() {
  const txt = document.getElementById('mission-input').value.trim();
  document.getElementById('mission-submit').disabled = !(selectedEmoOpt && selectedOpt && txt.length > 0);
}

function submitMission() {
  if (submitted || !currentMission) return;
  submitted = true;

  document.getElementById('mission-input').disabled = true;
  document.getElementById('backBtn').style.display  = 'none';

  const msgEl = document.getElementById('mission-message');
  msgEl.innerHTML = currentMission.message.replace(/\n/g, '<br>');
  msgEl.classList.add('on');

  const submitBtn = document.getElementById('mission-submit');
  submitBtn.textContent = '완료하기 🌟';
  submitBtn.disabled    = false;
  submitBtn.onclick     = goToReward;
}

function goToReward() { show('s-reward'); }

function selectReward(btn, reward) {
  selectedReward = reward;
  document.querySelectorAll('.reward-btn').forEach(b => {
    b.classList.toggle('on',  b === btn);
    b.classList.toggle('off', b !== btn);
  });
  document.getElementById('rewardNotice').classList.add('on');
  document.getElementById('rewardConfirm').style.display = 'block';
}

function completeMission() {
  const name = localStorage.getItem(K_CUR);
  if (name) {
    const ci = parseInt(localStorage.getItem(kCI(name)) || '0');
    localStorage.setItem(kLMC(name), String(ci));
    localStorage.setItem(kLMI(name), String(currentMission.id));
  }
  submitMissionToSheet(name);
  show('s-done');
  launchConfetti();
}

function submitMissionToSheet(name) {
  try {
    const d = new Date();
    const payload = {
      session:          'mission',
      date:             d.toISOString().slice(0, 10),
      time:             String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0'),
      student_name:     name || '',
      mission_id:       currentMission ? currentMission.id : '',
      selected_option:  (selectedEmoOpt || '') + ' / ' + (selectedOpt || ''),
      reflection:       (document.getElementById('mission-input') || {}).value || '',
      selected_reward:  selectedReward || ''
    };
    const url = localStorage.getItem(K_SCRIPT) || DEFAULT_SCRIPT_URL;
    if (!url) return;
    fetch(url, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
  } catch(e) {}
}

function launchConfetti() {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9999';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  canvas.width = innerWidth; canvas.height = innerHeight;
  const colors = ['#FF6B35','#FFD166','#4ECDC4','#A78BFA','#FF8C42','#45B7AA'];
  const pieces = Array.from({length:100}, () => ({
    x:Math.random()*canvas.width, y:-10,
    r:Math.random()*6+4, c:colors[Math.floor(Math.random()*colors.length)],
    vx:(Math.random()-.5)*4, vy:Math.random()*4+2,
    rot:Math.random()*360, vr:(Math.random()-.5)*8, op:1
  }));
  let alive = pieces.length;
  (function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.vy+=.08;
      if(p.op>0&&(p.y>canvas.height||p.x<-20||p.x>canvas.width+20)){p.op-=.04;if(p.op<=0)alive--;}
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha=Math.max(0,p.op); ctx.fillStyle=p.c;
      ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r); ctx.restore();
    });
    if(alive>0) requestAnimationFrame(draw); else canvas.remove();
  })();
}
</script>
